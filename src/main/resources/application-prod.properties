# ==========================================
# Production Profile Overrides
# ==========================================

# Server Production Hardening
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s
server.forward-headers-strategy=framework

# Secure Error Handling
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never

# Database Settings (Loaded from Environment Variables)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Production Pool Settings
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:2}
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:10}
spring.datasource.hikari.max-lifetime=${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:300000}
spring.datasource.hikari.idle-timeout=${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:120000}
spring.datasource.hikari.keepalive-time=${SPRING_DATASOURCE_HIKARI_KEEPALIVE_TIME:60000}
spring.datasource.hikari.connection-timeout=${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.validation-timeout=${SPRING_DATASOURCE_HIKARI_VALIDATION_TIMEOUT:5000}

# JPA / Hibernate Production Settings (schema validation, no SQL logs)
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Production Secrets
rccms.admin.user-id=${RCCMS_ADMIN_USER_ID}
rccms.admin.password=${RCCMS_ADMIN_PASSWORD}
rccms.jwt.secret=${RCCMS_JWT_SECRET}
rccms.jwt.expiry-ms=${RCCMS_JWT_EXPIRY_MS:86400000}
rccms.cors.allowed-origins=${RCCMS_CORS_ALLOWED_ORIGINS}

# Files Config
rccms.files.upload-dir=${RCCMS_FILES_UPLOAD_DIR:uploads}
rccms.files.max-size-bytes=${RCCMS_FILES_MAX_SIZE_BYTES:5242880}

# External API Integrations
rccms.land-records.bearer-token=${RCCMS_LAND_RECORDS_BEARER_TOKEN}
rccms.land-records.api-key=${RCCMS_LAND_RECORDS_API_KEY}
rccms.land-records.secret-key=${RCCMS_LAND_RECORDS_SECRET_KEY}
rccms.land-records.allow-insecure-ssl=false

rccms.land-records.g2b.webservice-id=${RCCMS_LAND_RECORDS_G2B_WEBSERVICE_ID:25}
rccms.land-records.g2b.ws-user-id=${RCCMS_LAND_RECORDS_G2B_WS_USER_ID}
rccms.land-records.g2b.password=${RCCMS_LAND_RECORDS_G2B_PASSWORD}
