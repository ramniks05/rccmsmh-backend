spring.application.name=rccms-app
server.port=8080

# spring.datasource.url=jdbc:postgresql://10.48.65.79:5432/rccms_mh
# spring.datasource.username=postgres
# spring.datasource.password=QG^vFHb2rPROLV
#----------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/rccms_mh_new
spring.datasource.username=postgres
spring.datasource.password=postgres



# HikariCP Production Configuration
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10

# Keep connections fresh before firewall/network closes them
spring.datasource.hikari.max-lifetime=300000
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.keepalive-time=60000

# Wait longer in production, 5 sec is too low
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000

# Optional, PostgreSQL driver already validates connections
# spring.datasource.hikari.connection-test-query=SELECT 1



spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# RCCMS covers Maharashtra only (LGD state code).
rccms.boundary.covered-state-lgd-code=27

rccms.admin.user-id=admin
