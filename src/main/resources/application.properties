rccms.cors.allowed-origins=http://localhost:4200,https://uatrccms.mahabhumi.gov.in
# File uploads (advocate certificate, filing attachments).
# Change rccms.files.upload-dir when moving to a shared/server path; storageKey in DB stays valid
# as long as files are migrated under the new root (see FileStorageService.resolveStoragePath).
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
rccms.files.upload-dir=uploads
rccms.files.max-size-bytes=5242880

