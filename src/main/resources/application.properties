# ==========================================
# Core Base Configuration (Common to all profiles)
# ==========================================

spring.application.name=rccms-app
server.port=8080

# Default active profile
spring.profiles.active=dev

# Multipart File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Mahabhumi Land Records API Base Configurations
rccms.land-records.base-url=https://api.mahabhumi.gov.in/api
rccms.land-records.g2b.base-url=https://g2b.mahabhumi.gov.in/REST_API
rccms.land-records.rural.satbara-pdf-path=/eferfar/getSatbaraPDF
rccms.land-records.rural.satbara-pdf-fallback-path=/eferfar/getDigitallySignedSatbaraPDF
